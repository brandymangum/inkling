<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Health — Inkling</title>
  <link rel="stylesheet" href="lib/ds.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-canvas); }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb { background: #C6C9CE; border-radius: 6px; border: 3px solid var(--bg-canvas); }
    ::-webkit-scrollbar-thumb:hover { background: #A4A8AF; }
    ::-webkit-scrollbar-track { background: transparent; }
    @keyframes slideIn { from { transform: translateX(24px); opacity: 0.4; } to { transform: translateX(0); opacity: 1; } }
    @keyframes confettiFall { to { transform: translateY(105vh) rotate(540deg); opacity: 0.9; } }
    @keyframes cheerPop { 0% { transform: translate(-50%,-50%) scale(0.4); opacity: 0; } 18% { transform: translate(-50%,-50%) scale(1.08); opacity: 1; } 80% { opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0; } }
    @keyframes cheerDance { 0%,100% { transform: rotate(-12deg) translateY(0); } 50% { transform: rotate(12deg) translateY(-8px); } }
    button:focus-visible { outline: 2px solid var(--green-brand); outline-offset: 1px; }
    table { font-variant-numeric: tabular-nums; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="lib/data.js"></script>
  <script src="lib/playbooks.js"></script>
  <script type="text/babel" src="lib/components.jsx"></script>
  <script type="text/babel" src="lib/charts.jsx"></script>
  <script type="text/babel" src="lib/alerts.jsx"></script>
  <script type="text/babel" src="lib/dashboard.jsx"></script>
  <script type="text/babel" src="lib/detail.jsx"></script>
  <script type="text/babel" src="lib/playbooks.jsx"></script>
  <script type="text/babel" src="lib/accounts.jsx"></script>
  <script type="text/babel" src="lib/notes.jsx"></script>
  <script type="text/babel" src="lib/triggers.jsx"></script>
  <script type="text/babel" src="lib/buildplan.jsx"></script>
  <script type="text/babel" src="lib/tweaks-panel.jsx"></script>
  <script type="text/babel" src="lib/app.jsx"></script>
</body>
</html>
